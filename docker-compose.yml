version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

networks:
  apex-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  apex-logs:
  apex-data:

services:

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: apex-zookeeper
    restart: unless-stopped
    networks:
      - apex-net
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_LOG_LEVEL: WARN
    volumes:
      - zookeeper-data:/bitnami/zookeeper/data
      - zookeeper-log:/bitnami/zookeeper/log
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  kafka:
    image: bitnami/kafka:3.6
    container_name: apex-kafka
    restart: unless-stopped
    networks:
      - apex-net
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 48
      KAFKA_CFG_LOG_SEGMENT_BYTES: 536870912
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: unless-stopped
    networks:
      - apex-net
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
        --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  app:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile
    image: apex-trading:latest
    container_name: apex-app
    restart: unless-stopped
    networks:
      - apex-net
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
      - "8501:8501"
      - "80:80"
    volumes:
      - apex-logs:/app/logs
      - apex-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 1g
          cpus: "0.5"
    logging: *default-logging
